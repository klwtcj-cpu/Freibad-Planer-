<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🏊 FreibadPlan</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>🏊 FreibadPlan</h1>

    <h2>Freibadsaison 2027</h2>
<p>01.05.2027 – 10.09.2027</p>

    <div class="card">

        <h3>Mitarbeiter</h3>

        <label><input type="checkbox" id="oli" checked> Oli (100%)</label><br>
<label><input type="checkbox" id="andi" checked> Andi (80%)</label><br>
<label><input type="checkbox" id="chiara" checked> Chiara (60%)</label><br>
<label><input type="checkbox" id="dieter" checked> Dieter (50%)</label><br>
    </div>
<div class="card">
    <h3>Wochentage</h3>

    <label><input type="checkbox" id="montag" checked> Montag</label><br>
    <label><input type="checkbox" id="dienstag" checked> Dienstag</label><br>
    <label><input type="checkbox" id="mittwoch" checked> Mittwoch</label><br>
    <label><input type="checkbox" id="donnerstag" checked> Donnerstag</label><br>
    <label><input type="checkbox" id="freitag" checked> Freitag</label><br>
    <label><input type="checkbox" id="samstag" checked> Samstag</label><br>
    <label><input type="checkbox" id="sonntag" checked> Sonntag</label><br>
</div>
<div class="card">
    <h3>Urlaub / Freiwünsche</h3>

    <textarea
        id="urlaub"
        rows="6"
        placeholder="Beispiel:
Oli: 12.05.2027
Andi: 18.05.2027
Chiara: 21.05.2027"></textarea>
</div>
<div class="card">
    <h3>Schichten</h3>

    <label><input type="checkbox" id="frueh" checked> Frühschicht</label><br>
    <label><input type="checkbox" id="spaet" checked> Spätschicht</label>
</div>
    <button id="generateButton">
        Dienstplan berechnen
    </button>

    <p id="status">
        Version 0.1
    </p>

</div>

<script src="app.js?v=6"></script>

</body>
</html>
